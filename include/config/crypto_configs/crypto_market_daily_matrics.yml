sync_crypto_market_daily_matrics_dag:
  api:
    api_key_var: "coingecko_api_key"
    api_key_header: "x-cg-demo-api-key"

    markets:
      url: "https://api.coingecko.com/api/v3/coins/markets"
      timeout: 60
      retries: 4
      backoff: 2
      batch_size: 50
      retry_statuses:
        - 429
        - 500
        - 502
        - 503
        - 504
      params:
        vs_currency: "usd"
        sparkline: false
        price_change_percentage: "24h"
        precision: "full"

    tickers:
      enabled: true
      url: "https://api.coingecko.com/api/v3/coins/{coingecko_id}/tickers"
      timeout: 60
      retries: 4
      backoff: 2
      request_pause_seconds: 1.5
      failure_pause_seconds: 5
      retry_statuses:
        - 429
        - 500
        - 502
        - 503
        - 504
      params:
        page: 1
        order: "volume_desc"
        depth: true

  db:
    postgres_conn_id: "keynum-central-pg"
    source_table: "raw_crypto_data.cryptocurrency_top100"
    target_table: "raw_crypto_data.cryptocurrency_market_metrics_daily"
